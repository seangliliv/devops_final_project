# tasks for only create the master instance 
- name: install Pip
  apt: 
    name: python3-pip
    state: present 
- name: Ensure the package are installed
  pip:
    name:
      - requests
      - google-auth

- name: Loop to show machines specs
  debug: 
    msg: |
      Machine Name: {{ item.name }}
  loop: "{{ machines_info }}"
  when: true 

- name: Slurp pub key from local machine
  slurp:
    src: "{{ ssh_pubkey_path }}"
  register: ssh_pubkey
  when: true 

- name: Create GCP instance
  google.cloud.gcp_compute_instance:
    name: "{{ item.name }}"
    machine_type: "{{ item.machine_type }}"
    zone: "{{ item.zone }}"
    project: "{{google_project_id}}"
    auth_kind: application
    #auth_kind: "serviceaccount"
    #service_account_file: "{{ service_account_path }}"
    state: present # absent -> delete instance 
    metadata:
      ssh-keys: "{{agent_user}}:{{ ssh_pubkey['content'] | b64decode }}"

    disks:
      - auto_delete: true
        boot: true
        initialize_params:
          source_image: "{{ item.image }}"
          disk_size_gb: "{{ item.disk_size }}"
          disk_type: "{{ item.disk_type }}"
          
    network_interfaces:
      - network:
          selfLink: "projects/{{google_project_id}}/global/networks/default"
        access_configs:
          - name: External NAT
            type: ONE_TO_ONE_NAT
    tags:
      items:
        - http-server
        - https-server
  environment: 
    GOOGLE_APPLICATION_CREDENTIALS: "{{ adc_file }}" 
  loop: "{{ machines_info }}" 

  register: gcp_instances
  # when: false 
  when: item.name in ["master01"]  

- name: Write gcp_instances into json file
  copy:
    content: "{{ gcp_instances }}"
    dest: "./gcp_more_instances.json"
  when: true
- name: Create inventory from template 
  template: 
    src: ../templates/machine-inventory.j2
    dest: ../inventory.ini
  when: true  

- name: Remove old host key from known_hosts
  known_hosts:
    name: "{{ (gcp_instances.results | selectattr('item.name', 'equalto', 'master01') | selectattr('skipped', 'undefined') | list | first).networkInterfaces[0].accessConfigs[0].natIP }}"
    state: absent
  delegate_to: localhost

# ── Wait for master01 SSH before next playbook ───────────────────────────────
- name: Wait for master01 SSH to be ready
  wait_for:
    host: "{{ (gcp_instances.results | selectattr('item.name', 'equalto', 'master01') | selectattr('skipped', 'undefined') | list | first).networkInterfaces[0].accessConfigs[0].natIP }}"
    port: 22
    delay: 10
    timeout: 120
    state: started
  delegate_to: localhost