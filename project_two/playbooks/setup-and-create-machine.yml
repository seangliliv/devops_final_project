---
# This playbook runs from local machine, SSHes into master01 and:
# 1. Installs Ansible + dependencies on master01
# 2. Copies local id_rsa.pub to master01
# 3. Copies playbook files to master01
# 4. Runs create-machines playbook from master01 to create master02, master03, worker01, worker02
# Usage: just create-other-machines

- name: Setup master01 and create other VMs
  hosts: master01
  become: false
  vars_files:
    - ./vars/machines.yml
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
    remote_workspace: "/home/{{ agent_user }}/project"

  tasks:
    # ── Install Ansible and dependencies on master01 ──────────────────────────
    # ── Install Ansible and dependencies on master01 ──────────────────────────
    # - name: Update apt cache
    #   apt:
    #     update_cache: true
    #   become: true

    # - name: Install python3-pip on master01
    #   apt:
    #     name:
    #       - python3-pip
    #       - python3-venv
    #     state: present
    #   become: true
      # ── Fix pyopenssl conflict FIRST before any other task ───────────────────
    - name: Fix pyopenssl conflict on master01
      raw: pip3 install pyopenssl --upgrade
      become: true

    - name: Update apt cache
      apt:
        update_cache: true
      become: true

    # install ansible via pip to avoid OpenSSL conflict with apt version
    - name: Install Ansible via pip on master01
      pip:
        name:
          - ansible
          - requests
          - google-auth
          - pyopenssl
        state: latest
      become: true

    # - name: Install GCP ansible collection on master01
    #   command: ansible-galaxy collection install google.cloud
    #   args:
    #     creates: "/home/{{ agent_user }}/.ansible/collections/ansible_collections/google/cloud"
    - name: Install locale on master01
      raw: |
        locale-gen en_US.UTF-8
        update-locale LANG=en_US.UTF-8
      become: true

    - name: Install GCP ansible collection on master01
      command: ansible-galaxy collection install google.cloud
      environment:
        LANG: en_US.UTF-8
        LC_ALL: en_US.UTF-8
      args:
        creates: "/home/{{ agent_user }}/.ansible/collections/ansible_collections/google/cloud"
    # ── Create workspace directories on master01 ──────────────────────────────
    - name: Create project directories on master01
      file:
        path: "{{ remote_workspace }}/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - playbooks/tasks
        - playbooks/vars
        - playbooks/templates

    # ── Copy SSH key to master01 ──────────────────────────────────────────────
    - name: Copy local id_rsa.pub to master01
      copy:
        src: "{{ ssh_pubkey_path }}"
        dest: "/home/{{ agent_user }}/.ssh/id_rsa.pub"
        mode: '0644'
    - name: Copy local id_rsa (private key) to master01
      copy:
        src: "{{ ssh_pubkey_path | replace('.pub', '') }}"
        dest: "/home/{{ agent_user }}/.ssh/id_rsa"
        mode: '0600'

    # ── Copy playbook files to master01 ──────────────────────────────────────
    - name: Copy vars/machines.yml to master01
      copy:
        src: ./vars/machines.yml
        dest: "{{ remote_workspace }}/playbooks/vars/machines.yml"

    - name: Copy create-machines-instances task to master01
      copy:
        src: ./tasks/create-machines-instances.yml
        dest: "{{ remote_workspace }}/playbooks/tasks/create-machines-instances.yml"

    - name: Copy machine-inventory template to master01
      copy:
        src: ./templates/machine-inventory.j2
        dest: "{{ remote_workspace }}/playbooks/templates/machine-inventory.j2"

    - name: Copy create-machines-playbook to master01
      copy:
        src: ./create-machines-playbook.yml
        dest: "{{ remote_workspace }}/playbooks/create-machines-playbook.yml"
    - name: copy inventory file to master01
      copy:
        src: ../inventory.ini
        dest: "{{ remote_workspace }}/playbooks/inventory.ini"
    - name: copy destroy-machines-playbook to master01
      copy:
        src: ./destroy-machine-playbook.yml
        dest: "{{ remote_workspace }}/playbooks/destroy-machine-playbook.yml"

    # ── Switch auth to machineaccount (uses GCP metadata, no credentials file) 
