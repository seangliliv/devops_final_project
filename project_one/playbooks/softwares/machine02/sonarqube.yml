- name: Install SonarQube
  hosts: machine02
  become: false
  vars_files:
    - ../../vars/machines.yml
  tasks:
    - name: Set vm.max_map_count for sonarqube
      shell: |
        sudo sysctl -w vm.max_map_count=524288
        sudo sysctl -w fs.file-max=131072
        echo "vm.max_map_count=524288" | sudo tee -a /etc/sysctl.conf
        echo "fs.file-max=131072" | sudo tee -a /etc/sysctl.conf
      become: true

    - name: Create sonarqube directory
      file:
        path: /home/{{ agent_user }}/sonarqube
        state: directory
        mode: '0755'

    - name: Copy docker-compose file
      template:
        src: ../../templates/docker-compose-sonarqube.yml.j2
        dest: /home/{{ agent_user }}/sonarqube/docker-compose.yml

    - name: Run sonarqube via docker-compose
      shell: |
        docker compose -f /home/{{ agent_user }}/sonarqube/docker-compose.yml up -d

    - name: Wait for sonarqube to start
      wait_for:
        port: 9001
        delay: 15
        timeout: 180

    - name: Create webroot directory
      file:
        path: /var/www/html/.well-known/acme-challenge
        state: directory
        mode: '0755'
      become: true

    - name: Install nginx and certbot
      apt:
        name:
          - nginx
          - certbot
          - python3-certbot-nginx
        state: present
        update_cache: true
      become: true

    - name: Start and enable nginx
      service:
        name: nginx
        state: started
        enabled: true
      become: true

    - name: Create nginx config for sonarqube
      template:
        src: ../../templates/nginx-sonarqube.conf.j2
        dest: /etc/nginx/sites-available/sonarqube
      become: true

    - name: Enable sonarqube nginx site
      file:
        src: /etc/nginx/sites-available/sonarqube
        dest: /etc/nginx/sites-enabled/sonarqube
        state: link
      become: true

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      become: true

    - name: Test nginx config
      shell: nginx -t
      become: true

    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
      become: true

    - name: Run certbot with webroot
      shell: |
        certbot certonly \
          --webroot \
          -w /var/www/html \
          -d {{ sonarqube_domain }} \
          --agree-tos \
          -m {{ certbot_email }} \
          --non-interactive
      become: true

    - name: Install certificate to nginx
      shell: |
        certbot install \
          --nginx \
          --cert-name {{ sonarqube_domain }} \
          --non-interactive
      become: true

    - name: Restart nginx
      service:
        name: nginx
        state: restarted
      become: true